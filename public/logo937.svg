<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" role="img" aria-label="937 The Underground">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.2"/>
      <stop offset="20%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="80%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- 937 -->
  <text
    x="0"
    y="46"
    fill="#fafafa"
    font-family="Arial Black, Impact, Helvetica Neue, Helvetica, sans-serif"
    font-size="48"
    font-weight="900"
    letter-spacing="-1"
  >937</text>

  <!-- Frequency line -->
  <path
    d="M2 52 H52 M56 52 L62 46 L68 58 L74 44 L80 56 L86 50 L92 52"
    fill="none"
    stroke="url(#wave)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- THE UNDERGROUND -->
  <text
    x="104"
    y="30"
    fill="url(#accent)"
    font-family="Arial Black, Impact, Helvetica Neue, Helvetica, sans-serif"
    font-size="13"
    font-weight="900"
    letter-spacing="0.28em"
  >THE</text>
  <text
    x="104"
    y="52"
    fill="url(#accent)"
