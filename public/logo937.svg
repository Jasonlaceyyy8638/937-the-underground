    font-size="13"
    font-weight="900"
    letter-spacing="0.28em"
  >UNDERGROUND</text>

  <!-- On-air dot -->
  <circle cx="348" cy="14" r="4" fill="#ec4899"/>
  <circle cx="348" cy="14" r="8" fill="#ec4899" opacity="0.25"/>
