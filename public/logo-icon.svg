<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="937 The Underground">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0"/>
      <stop offset="25%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="75%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Subtle console frame -->
  <g stroke="url(#accent)" stroke-width="2.5" fill="none" opacity="0.35">
    <path d="M 88 120 V 392 H 120"/>
    <path d="M 424 120 V 392 H 392"/>
  </g>

  <!-- 937 — large, unmistakable -->
  <text
    x="256"
    y="292"
    text-anchor="middle"
    fill="#fafafa"
    font-family="Arial Black, Impact, Helvetica Neue, Helvetica, sans-serif"
    font-size="168"
    font-weight="900"
    letter-spacing="-6"
  >937</text>

  <!-- Waveform -->
  <path
    d="M 96 340
       L 128 340 L 140 312 L 152 368 L 164 300 L 176 352 L 188 324 L 200 340
       L 232 340 L 244 312 L 256 368 L 268 300 L 280 352 L 292 324 L 304 340
       L 336 340 L 348 312 L 360 368 L 372 300 L 384 352 L 396 324 L 408 340"
    fill="none"
    stroke="url(#wave)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Label -->
  <text
    x="256"
    y="404"
    text-anchor="middle"
    fill="url(#accent)"
    font-family="Arial Black, Impact, Helvetica Neue, Helvetica, sans-serif"
    font-size="24"
    font-weight="900"
    letter-spacing="0.32em"
  >UNDERGROUND</text>

  <!-- On-air indicator -->
  <circle cx="256" cy="128" r="8" fill="#ec4899"/>
  <circle cx="256" cy="128" r="16" fill="#ec4899" opacity="0.2"/>
</svg>
